<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><title>sample data generator (dev)</title></head>
<body>
<h1>サンプルデータ生成（開発用ハーネス）</h1>
<p>node が無い環境でも generate_sample_data.mjs を実行できるようにするページ。
scripts/dev_server.py 起動中なら POST /save で data/*.json に保存する。</p>
<pre id="log"></pre>
<script type="module">
import { generate } from './generate_sample_data.mjs';
const log = m => document.getElementById('log').textContent += m + '\n';
const t = generate();
window.__DATA = t;
for (const name of Object.keys(t)) {
  const body = JSON.stringify(t[name], null, name === 'timeseries' ? 0 : 1) + '\n';
  try {
    const r = await fetch('/save?name=' + name, { method: 'POST', body });
    log('data/' + name + '.json : ' + t[name].length + ' rows → ' + r.status);
  } catch (e) {
    log(name + ': 保存失敗（dev_server.py 起動中か確認） ' + e.message);
  }
}
log('done');
</script>
</body>
</html>
